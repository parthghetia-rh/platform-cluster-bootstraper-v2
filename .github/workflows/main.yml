name: Bootstrap OpenShift Cluster

on:
  push:
    branches:
      - main
    # The workflow will ONLY run if changes occur in these specific paths
    paths:
      - '00-bootstrap-gitops/**'
      - '01-bootstrap-vault/**' 
      - '.github/workflows/main.yml'
      
  # It's always a good idea to keep workflow_dispatch so you can still run it manually
  workflow_dispatch:

env:
  ROSA_API_URL: ${{ secrets.ROSA_API_URL }}
  CLUSTER_USERNAME: ${{ secrets.CLUSTER_USERNAME }}
  CLUSTER_PASSWORD: ${{ secrets.CLUSTER_PASSWORD }}
  OCP_VERSION: 4.21.9

jobs:
  bootstrap:
    name: Bootstrap Vault & GitOps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@v1

        #check version here: https://github.com/redhat-actions/openshift-tools-installer
        with:
          oc: "3"

      - name: Log in to OpenShift (ROSA)
        run: |
          oc login ${{ secrets.ROSA_API_URL }} --username=${{ secrets.CLUSTER_USERNAME }} --password=${{ secrets.CLUSTER_PASSWORD }}

      - name: Step 1 - Deploy Vault via Official Helm Chart
        run: |
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
          
          # Adjust values like HA or storage based on workshop needs.
          helm upgrade --install vault hashicorp/vault \
            --namespace vault-system \
            --create-namespace \
            -f 01-bootstrap-vault/values.yaml
          
          echo "Waiting for Vault pod to be created..."
          while ! oc get pod vault-0 -n vault-system >/dev/null 2>&1; do 
            sleep 5
          done

          echo "Waiting for Vault pod to enter 'Running' phase (it will not be 'Ready' until unsealed)..."
          while [ "$(oc get pod vault-0 -n vault-system -o jsonpath='{.status.phase}')" != "Running" ]; do
            echo "Pod is still starting... waiting 5 seconds."
            sleep 5
          done
          
          # Add a tiny buffer to ensure the Vault API inside the container is actually listening
          sleep 10 
          
          echo "Vault pod is Running and ready to be unsealed!"

      - name: Step 2 - Initialize and Unseal Vault (Idempotent)
        run: |
          echo "Checking Vault status..."
          # We use '|| true' because 'vault status' returns an exit code of 2 if it's sealed, which would crash the pipeline
          STATUS_JSON=$(oc exec vault-0 -n vault-system -- vault status -format=json || true)
          
          IS_INITIALIZED=$(echo $STATUS_JSON | jq -r .initialized)
          IS_SEALED=$(echo $STATUS_JSON | jq -r .sealed)
          
          if [ "$IS_INITIALIZED" = "false" ]; then
            echo "Vault is completely fresh. Initializing now..."
            INIT_OUTPUT=$(oc exec vault-0 -n vault-system -- vault operator init -key-shares=1 -key-threshold=1 -format=json)
            
            UNSEAL_KEY=$(echo $INIT_OUTPUT | jq -r .unseal_keys_b64[0])
            ROOT_TOKEN=$(echo $INIT_OUTPUT | jq -r .root_token)
            
            echo "Unsealing Vault..."
            oc exec vault-0 -n vault-system -- vault operator unseal $UNSEAL_KEY
            
            echo "Storing tokens for future use and ESO..."
            oc new-project external-secrets-operator
            
            # Store the Root Token for the External Secrets Operator
            oc create secret generic vault-token -n external-secrets-operator --from-literal=token=$ROOT_TOKEN
            
            # Store the Unseal Key securely so THIS pipeline can use it on future runs if the pod restarts
            oc create secret generic vault-unseal-key -n vault-system --from-literal=unseal-key=$UNSEAL_KEY
            
            echo "Vault successfully initialized and unlocked."
            
          else
            echo "Vault is already initialized."
            
            if [ "$IS_SEALED" = "true" ]; then
              echo "Vault is currently SEALED. Fetching saved unseal key..."
              
              # Retrieve the unseal key we saved during the very first pipeline run
              UNSEAL_KEY=$(oc get secret vault-unseal-key -n vault-system -o jsonpath='{.data.unseal-key}' | base64 --decode)
              
              if [ -z "$UNSEAL_KEY" ]; then
                echo "CRITICAL ERROR: Vault is sealed but the 'vault-unseal-key' secret is missing. Cannot proceed."
                exit 1
              fi
              
              echo "Unsealing Vault..."
              oc exec vault-0 -n vault-system -- vault operator unseal $UNSEAL_KEY
              echo "Vault successfully unsealed."
              
            else
              echo "Vault is already initialized and completely UNSEALED. Nothing to do!"
            fi
          fi

      - name: Step 3 - Deploy OpenShift GitOps & ESO
        run: |
          # 1. Install the Operator
          echo "Installing OpenShift GitOps Operator..."
          oc apply -k 00-bootstrap-gitops/gitops-operator/
          
          # 2. Wait for OLM to register the CRDs
          echo "Waiting for ArgoCD CRDs to become available..."
          while ! oc get crd applicationsets.argoproj.io >/dev/null 2>&1; do 
            echo "Waiting for ApplicationSet CRD..."
            sleep 5
          done
          
          # 3. Wait for the default ArgoCD instance to finish spinning up
          echo "Waiting for the ArgoCD server deployment to exist..."
          while ! oc get deployment openshift-gitops-server -n openshift-gitops >/dev/null 2>&1; do 
            sleep 5
          done
          
          echo "Waiting for the ArgoCD server to be Ready..."
          oc wait --for=condition=Available deployment/openshift-gitops-server -n openshift-gitops --timeout=300s
          
          # 4. Apply the Configuration (ApplicationSet)
          echo "Applying the ApplicationSet..."
          oc apply -k 00-bootstrap-gitops/gitops-config/
          
          echo "Initial Bootstrap complete. Move on to ArgoCD!!!"