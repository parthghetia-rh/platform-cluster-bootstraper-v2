name: Bootstrap OpenShift Cluster

on:
  push:
    branches:
      - main
    # The workflow will ONLY run if changes occur in these specific paths
    paths:
      - '00-bootstrap-gitops/**'
      - '01-bootstrap-vault/**' 
      - '.github/workflows/main.yml'
      
  # It's always a good idea to keep workflow_dispatch so you can still run it manually
  workflow_dispatch:

env:
  ROSA_API_URL: ${{ secrets.ROSA_API_URL }}
  CLUSTER_USERNAME: ${{ secrets.CLUSTER_USERNAME }}
  CLUSTER_PASSWORD: ${{ secrets.CLUSTER_PASSWORD }}
  OCP_VERSION: 4.21.9
  ROSA_TOKEN: ${{ secrets.ROSA_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}


jobs:
  bootstrap:
    name: Bootstrap Vault & GitOps
    runs-on: ubuntu-latest
    # CRITICAL: This explicitly requests write access for this specific job
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI (oc)
        uses: redhat-actions/openshift-tools-installer@v1

        # check oc version here and other utilities available: https://github.com/redhat-actions/openshift-tools-installer
        with:
          oc: "3"

      - name: Log in to OpenShift (ROSA)
        run: |
          oc login ${{ secrets.ROSA_API_URL }} --username=${{ secrets.CLUSTER_USERNAME }} --password=${{ secrets.CLUSTER_PASSWORD }}

      - name: Step 1 - Deploy and Configure Vault (Dev Mode)
        run: |
          echo "Adding HashiCorp Helm repository..."
          helm repo add hashicorp https://helm.releases.hashicorp.com

          helm repo update
          
          echo "Installing Vault in Dev Mode..."
          helm upgrade --install vault hashicorp/vault \
            --namespace vault-system \
            --create-namespace \
            --set "global.openshift=true" \
            --set "server.dev.enabled=true" \
            --set "server.image.repository=docker.io/hashicorp/vault" \
            --set "injector.image.repository=docker.io/hashicorp/vault-k8s"
          
          echo "Waiting for Vault pod to be running..."
          while [ "$(oc get pod vault-0 -n vault-system -o jsonpath='{.status.phase}')" != "Running" ]; do
            sleep 5
          done
          
          # Add a tiny buffer to ensure the Vault API is listening
          sleep 10 
          
          echo "Vault is Running. Configuring Kubernetes Auth..."
          
          # 1. Enable Kubernetes Auth
          oc exec vault-0 -n vault-system -- sh -c 'VAULT_TOKEN=root vault auth enable kubernetes || true'
          
          # 1. Update the K8s Auth Config (Adding CA cert is best practice in OpenShift)
          oc exec vault-0 -n vault-system -- sh -c 'VAULT_TOKEN=root vault write auth/kubernetes/config \
            kubernetes_host="https://kubernetes.default.svc:443" \
            kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt'

          # 2. Write the ESO Policy (CRUD + Patch + Mount discovery)
          oc exec vault-0 -n vault-system -- sh -c 'echo "
          path \"secret/data/*\" { capabilities = [\"create\", \"read\", \"update\", \"patch\", \"delete\"] }
          path \"secret/metadata/*\" { capabilities = [\"create\", \"read\", \"update\", \"delete\", \"list\"] }
          path \"sys/mounts\" { capabilities = [\"read\"] }
          " | VAULT_TOKEN=root vault policy write eso-policy -'

          # 3. Write the ArgoCD Policy (Strictly Read-Only)
          oc exec vault-0 -n vault-system -- sh -c 'echo "
          path \"secret/data/*\" { capabilities = [\"read\"] }
          path \"secret/metadata/*\" { capabilities = [\"read\", \"list\"] }
          " | VAULT_TOKEN=root vault policy write argocd-readonly-policy -'

          # 4. Bind the ESO Role (Strictly to the External Secrets namespace)
          # Note: Replace 'external-secrets' with your specific ESO service account name if it is not the default
          oc exec vault-0 -n vault-system -- sh -c 'VAULT_TOKEN=root vault write auth/kubernetes/role/eso-role \
            bound_service_account_names="eso-vault-sa" \
            bound_service_account_namespaces="external-secrets" \
            policies="eso-policy" \
            ttl=1h max_ttl=4h'

          # 5. Bind the ArgoCD Role (Strictly to the GitOps namespace)
          oc exec vault-0 -n vault-system -- sh -c 'VAULT_TOKEN=root vault write auth/kubernetes/role/argocd-role \
            bound_service_account_names="argocd-repo-server" \
            bound_service_account_namespaces="openshift-gitops" \
            policies="argocd-readonly-policy" \
            ttl=1h max_ttl=4h'
          
          echo "Vault setup is complete!"
          
          RAW_URL="$ROSA_API_URL"
          echo "Received raw URL: $RAW_URL"

          CLEAN_DOMAIN=$(echo "$RAW_URL" | sed -e 's|^https://api.||' -e 's|:443$||')
          echo "Cleaned Domain: $CLEAN_DOMAIN"

          
          echo "Pushing all credentials and configs to Vault..."
          oc exec vault-0 -n vault-system -- sh -c "
            export VAULT_TOKEN=root

            vault kv put secret/rosa-token \
              token=\"$ROSA_TOKEN\"

            vault kv put secret/aws-credentials \
              AWS_ACCESS_KEY_ID=\"$AWS_ACCESS_KEY_ID\" \
              AWS_SECRET_ACCESS_KEY=\"$AWS_SECRET_ACCESS_KEY\"

            vault kv put secret/rosa-domain \
              domain=\"$CLEAN_DOMAIN\"
          "
            
          echo "Secrets successfully populated in Vault! Handing off to ArgoCD"

      - name: Step 2 - Deploy OpenShift GitOps
        run: |
          # 1. Install the Operator
          echo "Installing OpenShift GitOps Operator..."
          oc apply -f 00-bootstrap-gitops/gitops-operator/gitops-subscription.yaml
          
          # 2. Wait for OLM to register the CRDs
          echo "Waiting for ArgoCD CRDs to become available..."
          # Added argocds.argoproj.io to the wait condition to ensure it's safe to apply the instance
          while ! oc get crd argocds.argoproj.io applicationsets.argoproj.io >/dev/null 2>&1; do 
            echo "Waiting for ArgoCD CRDs..."
            sleep 5
          done
          
          # 3. Apply the Custom ArgoCD Instance (Performance overrides & AVP sidecar)
          echo "Applying Custom ArgoCD Instance..."
          oc apply -f 00-bootstrap-gitops/gitops-operator/argocd-instance.yaml
          
          # 4. Wait for the ArgoCD server deployment to exist
          echo "Waiting for the ArgoCD server deployment to exist..."
          while ! oc get deployment openshift-gitops-server -n openshift-gitops >/dev/null 2>&1; do 
            sleep 5
          done
          
          echo "Waiting for the ArgoCD API server to be Ready..."
          oc wait --for=condition=Available deployment/openshift-gitops-server -n openshift-gitops --timeout=300s
          
          echo "Waiting for the ArgoCD Repo Server (Vault Sidecar) to be Ready..."
          # CRITICAL: Wait for the repo server so AVP is online before the AppSet drops
          oc wait --for=condition=Available deployment/openshift-gitops-repo-server -n openshift-gitops --timeout=300s
          
          # 5. Apply the Configuration (ApplicationSet)
          echo "Applying the ApplicationSet..."
          oc apply -f 00-bootstrap-gitops/gitops-config/
          
          echo "Initial Bootstrap complete. Move on to ArgoCD!!!"