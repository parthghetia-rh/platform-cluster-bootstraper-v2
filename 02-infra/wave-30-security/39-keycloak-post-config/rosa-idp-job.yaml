apiVersion: batch/v1
kind: Job
metadata:
  name: configure-rosa-idp
  namespace: keycloak
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: rosa-cli
          image: registry.access.redhat.com/ubi8/ubi-minimal:latest 
          env:
            - name: ROSA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rosa-token
                  key: ROSA_TOKEN
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-client-secret-openshift
                  key: CLIENT_SECRET
            - name: CLIENT_ID
              value: "openshift"
            - name: DOMAIN
              value: "apps.your-cluster-domain.com" # <-- UPDATE THIS
            - name: REGION
              value: "us-east-2"                    # <-- UPDATE THIS
          command:
            - /bin/bash
            - -c
            - |
              set -e 
              
              # 2. 🟢 Create a local bin folder in /tmp just for ROSA
              mkdir -p /tmp/bin
              export PATH=/tmp/bin:$PATH
              
              echo "Downloading ROSA CLI..."
              curl -sL -o /tmp/rosa.tar.gz https://mirror.openshift.com/pub/openshift-v4/clients/rosa/latest/rosa-linux.tar.gz
              tar -xf /tmp/rosa.tar.gz -C /tmp
              mv /tmp/rosa /tmp/bin/rosa
              chmod +x /tmp/bin/rosa
              rm -f /tmp/rosa.tar.gz

              echo "Testing installations..."
              jq --version
              rosa version

              echo "Logging into ROSA OCM..."
              rosa login --token="${ROSA_TOKEN}"

              echo "Fetching ROSA cluster name..."
              CLUSTER_NAME=$(rosa list clusters -o json | jq -r '.[0].name')
              
              if [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" == "null" ]; then
                echo "Error: Could not retrieve cluster name. Check your ROSA_TOKEN."
                exit 1
              fi
              
              echo "Found cluster: ${CLUSTER_NAME}"
              
              echo "Checking if Keycloak IDP already exists..."
              IDP_EXISTS=$(rosa list idps --cluster="${CLUSTER_NAME}" --region="${REGION}" -o json | jq '[.[] | select(.name == "keycloak")] | length' || echo "0")
              
              if [ "$IDP_EXISTS" -gt 0 ]; then
                echo "IDP 'keycloak' already exists. Skipping creation."
                exit 0
              fi
              
              echo "Creating Keycloak IDP in ROSA..."
              rosa create idp \
                --cluster="${CLUSTER_NAME}" \
                --name="keycloak" \
                --type="openid" \
                --client-id="${CLIENT_ID}" \
                --client-secret="${CLIENT_SECRET}" \
                --issuer-url="https://keycloak-keycloak.${DOMAIN}/auth/realms/${CLIENT_ID}" \
                --mapping-method="claim" \
                --email-claims="email" \
                --name-claims="name" \
                --groups-claims="groups" \
                --username-claims="preferred_username"
              
              echo "ROSA IDP creation successful!"