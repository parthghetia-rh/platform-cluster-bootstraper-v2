apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea-repo-org-credentials
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "53"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: eso-admin-secret-store
    kind: ClusterSecretStore
  target:
    name: gitea-repo-org-credentials
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: "repo-creds"
      data:
        password: "{{`{{ .password }}`}}"
        username: "gitea_admin"
        url: "https://gitea.apps.rosa.<path:secret/data/rosa-domain#domain>/workshop"
  data:
    - secretKey: "password"
      remoteRef:
        key: gitea
        property: token
    - secretKey: "domain"
      remoteRef:
        key: secret/rosa-domain
        property: domain
