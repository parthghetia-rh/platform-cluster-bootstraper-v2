apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    app: gitea
    app.kubernetes.io/instance: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "53"
  name: gitea-http
  namespace: gitea
spec:
  host: "gitea.apps.rosa.<path:secret/data/rosa-domain#domain>"
  path: /
  port:
    targetPort: http
  tls:
    insecureEdgeTerminationPolicy: Redirect 
    termination: edge
  to:
    kind: Service
    name: gitea-service-http
    weight: 100
  wildcardPolicy: None
