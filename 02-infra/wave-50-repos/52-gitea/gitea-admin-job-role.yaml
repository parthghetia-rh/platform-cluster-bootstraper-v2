apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitea-admin-job-role
  namespace: gitea
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
