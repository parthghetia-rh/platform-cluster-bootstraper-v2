apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-repo-org-credentials
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "54"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: eso-admin-secret-store
    kind: ClusterSecretStore
  target:
    name: gitlab-repo-org-credentials
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: "repo-creds"
      data:
        password: "{{`{{ .password }}`}}"
        username: "root"
        url: "https://gitlab.apps.rosa.<path:secret/data/rosa-domain#domain>/self-provisioned"
  data:
    - secretKey: "password"
      remoteRef:
        key: gitlab
        property: token