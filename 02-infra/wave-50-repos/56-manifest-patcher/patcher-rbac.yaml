---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-manifest-patcher
  namespace: openshift-config
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vault-manifest-patcher-role
rules:
  # Permissions to patch ConsoleLinks (Cluster-scoped)
  - apiGroups: ["console.openshift.io"]
    resources: ["consolelinks"]
    verbs: ["get", "list", "patch", "update"]
  # Permissions to patch Routes (Namespace-scoped)
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-manifest-patcher-binding
subjects:
  - kind: ServiceAccount
    name: vault-manifest-patcher
    namespace: openshift-config
roleRef:
  kind: ClusterRole
  name: vault-manifest-patcher-role
  apiGroup: rbac.authorization.k8s.io