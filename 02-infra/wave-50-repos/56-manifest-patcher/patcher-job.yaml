apiVersion: batch/v1
kind: Job
metadata:
  name: apply-vault-domain
  namespace: openshift-config
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: vault-manifest-patcher
      restartPolicy: OnFailure
      containers:
        - name: patcher
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              
              echo "Fetching clean domain from vault-secrets-ns/rosa-domain-secret..."
              
              # Pull the secret value directly. 
              # No cleaning needed since GitHub Actions handled it!
              DOMAIN=$(oc get secret rosa-domain-secret -n vault-secrets-ns -o jsonpath='{.data.DOMAIN}' | base64 -d)

              if [ -z "$DOMAIN" ]; then
                echo "ERROR: Domain value is empty in secret!"
                exit 1
              fi

              echo "Using Domain: $DOMAIN"

              # 1. Patch the Cluster-wide ConsoleLink
              echo "Updating ConsoleLink..."
              oc patch consolelink gitea -n gitea --type=merge -p "{\"spec\":{\"href\":\"https://gitea.${DOMAIN}\"}}"

              # 2. Patch the Route in the gitea namespace
              echo "Updating Route..."
              oc patch route gitea-ui -n gitea --type=merge -p "{\"spec\":{\"host\":\"gitea.${DOMAIN}\"}}"

              echo "Successfully synchronized Vault domain to manifests."
          env:
            - name: RAW_VAULT_URL
              valueFrom:
                secretKeyRef:
                  name: "rosa-token"
                  key: "rosa-domain"