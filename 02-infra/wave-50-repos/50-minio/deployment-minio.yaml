apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-operator
  annotations:
    argocd.argoproj.io/sync-wave: "52"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - containerPort: 9000
            - containerPort: 9090
          command:
            - /bin/bash
            - -c
          args:
            - minio server /data --console-address :9090
          volumeMounts:
            - name: minio-storage
              mountPath: /data
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-storage
