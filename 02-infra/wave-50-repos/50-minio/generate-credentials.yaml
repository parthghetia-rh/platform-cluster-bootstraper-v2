---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: username
  namespace: minio-operator
  annotations:
    argocd.argoproj.io/sync-wave: "51"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  data:
    username: minioadmin
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: password
  namespace: minio-operator
  annotations:
    argocd.argoproj.io/sync-wave: "51"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  length: 10
  symbols: 0
  digits: 4
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "minio-credentials"
  namespace: minio-operator
  annotations:
    argocd.argoproj.io/sync-wave: "51"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: "0"
  target:
    name: minio-credentials
  dataFrom:
    - rewrite:
        - regexp:
            source: "username"
            target: "MINIO_ROOT_USER"
      sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: "username"
    - rewrite:
        - regexp:
            source: "password"
            target: "MINIO_ROOT_PASSWORD"
      sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: "password"