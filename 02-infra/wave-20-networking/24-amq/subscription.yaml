apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: amq-streams
  namespace: kafka-streams
  annotations:
    argocd.argoproj.io/sync-wave: "24"
spec:
  channel: stable
  installPlanApproval: Automatic
  name: amq-streams
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  config:
    resources:
      limits:
        cpu: '2'
        memory: 4Gi
      requests:
        cpu: 200m
        memory: 386Mi

